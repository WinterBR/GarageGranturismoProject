server:
  port: 8080

spring:
  application:
    name: garage-service

  # NOTE: spring.datasource.* is intentionally NOT used here.
  # The actual DataSource bean is built manually in
  # com.granturismo.garage.config.DataSourceFallbackConfig, which tries
  # PostgreSQL first and falls back to H2 automatically if PostgreSQL
  # is unreachable. The app.datasource.* properties below feed that bean.

  jpa:
    open-in-view: false
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        # hibernate.dialect is intentionally omitted: Hibernate 6 auto-detects
        # the correct dialect (PostgreSQL or H2) from the active JDBC connection,
        # which is exactly what we need since the DataSource is chosen at runtime.
    show-sql: false

  sql:
    init:
      mode: always

  h2:
    console:
      enabled: true
      path: /h2-console

# Custom datasource settings consumed by DataSourceFallbackConfig.
app:
  datasource:
    postgres:
      # Port 1883 as requested. Default PostgreSQL port is normally 5432;
      # adjust here (or via env vars below) if your Postgres listens elsewhere.
      url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:1883}/${POSTGRES_DB:garage_db}
      username: ${POSTGRES_USER:garage_user}
      password: ${POSTGRES_PASSWORD:garage_pass}
      driver-class-name: org.postgresql.Driver
      connection-timeout-ms: 10000
    h2:
      url: jdbc:h2:mem:garage_fallback_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
      username: sa
      password: ""
      driver-class-name: org.h2.Driver

  # Single hard-coded application user + JWT signing/expiration settings.
  # The secret below is a sane default for local/dev use; override it via
  # the GARAGE_JWT_SECRET env var in any real deployment.
  security:
    admin:
      username: admin
      # BCrypt hash of "user1234". Generated once; never store the raw
      # password anywhere in the codebase.
      password-hash: "$2a$10$43NQwxWygUZJHAiUIAoTiuQh7gDSOWWOKuXhzYvd0iiPgidI04E72"
    jwt:
      secret: ${GARAGE_JWT_SECRET:Bp12sp97dcMpWL2aQ6rcNW7uZiaDMBC+X21KAp5cbyZNSOVdMJD4LDAK0zxfjwaq+WVJRZYxbWAhPavx32HFwA==}
      # 5 minutes, in milliseconds. The frontend refreshes the token on the
      # same cadence, well before it actually expires.
      expiration-ms: 300000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.granturismo.garage: INFO
    org.hibernate.SQL: WARN
